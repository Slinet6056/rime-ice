patch:
  style/font_face: "Segoe UI Emoji, Harmonyos Sans SC"
  style/label_font_face: "Harmonyos Sans SC"
  style/comment_font_face: "Harmonyos Sans SC"
  style/font_point: 13
  style/label_font_point: 11
  style/comment_font_point: 12

  style/color_scheme: Catppuccin
  style/color_scheme_dark: Catppuccin

  style/layout/align_type: bottom
  style/layout/border_width: 1
  style/layout/margin_x: 0
  style/layout/margin_y: 0
  style/layout/spacing: 5
  style/layout/candidate_spacing: 20
  style/layout/hilite_spacing: 5
  style/layout/hilite_padding: 7
  style/layout/shadow_radius: 3
  style/layout/shadow_offset_x: 3
  style/layout/shadow_offset_y: 3
  style/layout/corner_radius: 10
  style/layout/round_corner: 5

  preset_color_schemes:
    Catppuccin:
      name: "Catppuccin"
      author: "缄默线"
      text_color: 0xF5D3CA
      back_color: 0x3A2724
      label_color: 0xA28780
      border_color: 0x3A2724
      comment_text_color: 0x9FD4EE
      candidate_text_color: 0xF5D3CA
      hilited_text_color: 0xF2AB89
      hilited_back_color: 0x261918
      hilited_comment_text_color: 0x9FD4EE
      hilited_candidate_text_color: 0xD6DBF4
      hilited_candidate_back_color: 0x644D49
      hilited_label_color: 0xCBADA5
      shadow_color: 0xAA000000
